services:
  postgres:
    image: postgres:16
    container_name: ba_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ba_intelligence_db
    ports:
      - "5435:5432"
    volumes:
      - ba_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: ba_Dockerfile
    container_name: ba_api
    restart: always
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ba_intelligence_db
      DB_USER: postgres
      DB_PASSWORD: postgres

volumes:
  ba_pgdata:
